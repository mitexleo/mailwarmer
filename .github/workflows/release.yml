name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build binary and packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller openpyxl python-dotenv PySide6

      - name: Install Qt runtime libraries (for PySide6)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libxkbcommon-x11-0 libfontconfig1 \
            libxcb-cursor0 libxcb-util1 libxcb-image0 \
            libxcb-keysyms1 libxcb-icccm4 libxcb-render-util0 \
            libxcb-shape0

      - name: Set version from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting __version__ = '$VERSION' from tag $GITHUB_REF_NAME"
          sed -i "s/__version__ = \".*\"/__version__ = \"$VERSION\"/" warmup_core.py

      - name: Build standalone binary with PyInstaller
        run: |
          grep "__version__" warmup_core.py
          pyinstaller --onefile --name warmup warmup.py warmup_core.py
          ./dist/warmup --cli --help

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: warmup-binary
          path: dist/warmup

      - name: Install fpm and rpmbuild
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby rpm
          sudo gem install fpm

      - name: Package .deb
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          fpm \
            -s dir \
            -t deb \
            -n warmup \
            -v "$VERSION" \
            --iteration 1 \
            --architecture amd64 \
            --description "SMTP warm-up tool — gradually send emails to build sender reputation" \
            --license AGPL-3.0-or-later \
            --url "https://github.com/${{ github.repository }}" \
            --maintainer "${{ github.repository_owner }}" \
            --deb-no-default-config-files \
            ./dist/warmup=/usr/local/bin/warmup

      - name: Package .rpm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          fpm \
            -s dir \
            -t rpm \
            -n warmup \
            -v "$VERSION" \
            --iteration 1 \
            --architecture amd64 \
            --rpm-os linux \
            --description "SMTP warm-up tool — gradually send emails to build sender reputation" \
            --license AGPL-3.0-or-later \
            --url "https://github.com/${{ github.repository }}" \
            --maintainer "${{ github.repository_owner }}" \
            ./dist/warmup=/usr/local/bin/warmup

      - name: List packages
        run: ls -la warmup*.deb warmup*.rpm

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "warmup ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          files: |
            warmup_*.deb
            warmup*.rpm
          generate_release_notes: true

  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: warmup-binary
          path: flatpak/

      - name: Install flatpak and flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Cache Flatpak runtimes
        id: cache-flatpak
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/flatpak
            .flatpak-builder
          key: flatpak-${{ runner.os }}-freedesktop-24.08

      - name: Add Flathub remote (user mode)
        if: steps.cache-flatpak.outputs.cache-hit != 'true'
        run: flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install Freedesktop Platform (user mode)
        if: steps.cache-flatpak.outputs.cache-hit != 'true'
        run: flatpak install --user -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

      - name: Build Flatpak
        run: |
          flatpak-builder \
            --force-clean \
            --user \
            --disable-cache \
            build-dir \
            flatpak/io.github.mitexleo.mailwarmer.ci.yml

      - name: Export and bundle
        run: |
          flatpak build-export repo build-dir
          flatpak build-bundle repo mailwarmer.flatpak io.github.mitexleo.mailwarmer

      - name: Upload Flatpak to Release
        uses: softprops/action-gh-release@v2
        if: always()
        with:
          files: mailwarmer.flatpak
          tag_name: ${{ github.ref_name }}
