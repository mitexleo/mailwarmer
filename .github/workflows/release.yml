name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build binary and packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller openpyxl python-dotenv

      - name: Build standalone binary with PyInstaller
        run: |
          pyinstaller --onefile --name warmup warmup.py
          ./dist/warmup --help

      - name: Install fpm and rpmbuild
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby rpm
          sudo gem install fpm

      - name: Package .deb
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          fpm \
            -s dir \
            -t deb \
            -n warmup \
            -v "$VERSION" \
            --iteration 1 \
            --architecture amd64 \
            --description "SMTP warm-up tool — gradually send emails to build sender reputation" \
            --license MIT \
            --url "https://github.com/${{ github.repository }}" \
            --maintainer "${{ github.repository_owner }}" \
            --deb-no-default-config-files \
            ./dist/warmup=/usr/local/bin/warmup

      - name: Package .rpm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          fpm \
            -s dir \
            -t rpm \
            -n warmup \
            -v "$VERSION" \
            --iteration 1 \
            --architecture amd64 \
            --rpm-os linux \
            --description "SMTP warm-up tool — gradually send emails to build sender reputation" \
            --license MIT \
            --url "https://github.com/${{ github.repository }}" \
            --maintainer "${{ github.repository_owner }}" \
            ./dist/warmup=/usr/local/bin/warmup

      - name: List packages
        run: ls -la warmup*.deb warmup*.rpm

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "warmup ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          files: |
            warmup_*.deb
            warmup*.rpm
          generate_release_notes: true
