app-id: io.github.mitexleo.mailwarmer
runtime: org.kde.Platform
runtime-version: "6.7"
sdk: org.kde.Sdk
command: warmup

finish-args:
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --device=dri

modules:
  - name: warmup
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation PySide6 openpyxl python-dotenv pyinstaller
      - pyinstaller --onefile --name warmup warmup.py warmup_core.py
      - install -Dm755 dist/warmup /app/bin/warmup
      - install -Dm644 flatpak/io.github.mitexleo.mailwarmer.desktop /app/share/applications/io.github.mitexleo.mailwarmer.desktop
      - install -Dm644 flatpak/io.github.mitexleo.mailwarmer.metainfo.xml /app/share/metainfo/io.github.mitexleo.mailwarmer.metainfo.xml
      - install -Dm644 flatpak/io.github.mitexleo.mailwarmer.svg /app/share/icons/hicolor/scalable/apps/io.github.mitexleo.mailwarmer.svg
    sources:
      - type: dir
        path: .
